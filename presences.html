<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Nom / Prénom</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        button {
            margin-top: 15px;
            padding: 10px 15px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .message {
            margin-top: 10px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Inscription</h2>
    <form id="formInscription">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" required>

        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" required>

        <button type="submit">Envoyer</button>
        <div class="message" id="message"></div>
    </form>
</div>

<script>
    const form = document.getElementById('formInscription');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            nom: document.getElementById('nom').value,
            prenom: document.getElementById('prenom').value
        };

        try {
            // 🔧 À TOI DE REMPLACER CETTE URL PAR TON SCRIPT SERVEUR
            const response = await fetch('https://ton-serveur-ou-script.com/enregistrer', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                message.textContent = 'Données envoyées avec succès !';
                message.style.color = 'green';
                form.reset();
            } else {
                message.textContent = 'Erreur lors de l’envoi des données.';
                message.style.color = 'red';
            }
        } catch (error) {
            console.error(error);
            message.textContent = 'Impossible de contacter le serveur.';
            message.style.color = 'red';
        }
    });
</script>
</body>
</html>
