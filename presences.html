<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Présences</title>
</head>
<body>

<h2>Entrer votre nom et prénom</h2>

<form id="form">
    <label>Nom :</label>
    <input type="text" id="nom" required>

    <label>Prénom :</label>
    <input type="text" id="prenom" required>

    <button type="submit">Envoyer</button>
</form>

<p id="msg"></p>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx.../exec";

document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        nom: document.getElementById("nom").value,
        prenom: document.getElementById("prenom").value
    };

    const res = await fetch(URL_SCRIPT, {
        method: "POST",
        body: JSON.stringify(data)
    });

    if (res.ok) {
        document.getElementById("msg").textContent = "Enregistré !";
        document.getElementById("form").reset();
    } else {
        document.getElementById("msg").textContent = "Erreur.";
    }
});
</script>

</body>
</html>
